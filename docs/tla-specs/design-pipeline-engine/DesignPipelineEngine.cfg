SPECIFICATION Spec

\* Constants — small concrete values for tractable model checking
CONSTANTS
    MaxPipelineRetries = 2
    MaxValidationAttempts = 2
    Experts = {"tdd", "ddd", "tla"}

\* Safety invariants
INVARIANT TypeOK
INVARIANT RetryBounded
INVARIANT ExpertsConsistent
INVARIANT HaltReasonConsistent
INVARIANT NoContextWithoutPhase
INVARIANT SingleInstance
INVARIANT ValidationAttemptsBounded
INVARIANT ArtifactPreservation

\* Liveness properties
PROPERTY PipelineTerminates
PROPERTY RetryExhaustionLeadsToTermination
PROPERTY ValidationExhaustionLeadsToTermination
