SPECIFICATION Spec

\* Small constants for tractable model checking
\* Dual-cache modeled: HtmlRequestIds for SWR, AssetRequestIds for cache-first
CONSTANTS
    HtmlRequestIds = {1}
    AssetRequestIds = {2}
    MaxPrecacheLinks = 2
    ConcurrencyLimit = 2
    CacheVersions = {v1, v2}
    NULL = NULL

\* Safety invariants
INVARIANT TypeOK
INVARIANT PrecacheBounded
INVARIANT OfflineFallbackCorrect
INVARIANT NotificationsValid
INVARIANT NotificationsHtmlOnly
INVARIANT RevalidationHtmlOnly
INVARIANT OldCachesExcludeCurrent

\* Liveness properties
PROPERTY EventualRevalidation
PROPERTY EventualPrecacheProgress
PROPERTY EventualCachePurge
PROPERTY EventualQueueDrain
