directive @key(fields: String!, resolvable: Boolean = true) repeatable on OBJECT | INTERFACE
directive @link(url: String!, as: String, import: [String]) repeatable on SCHEMA
directive @shareable on FIELD_DEFINITION | OBJECT

"""
An individual RSS article
"""
type Article @key(fields: "id") {
  """
  The HTML or text content of the article
  """
  content: String
  """
  The ID of the feed this article belongs to
  """
  feedId: String!
  """
  The globally unique identifier for the article from the RSS feed
  """
  guid: String!
  """
  The internal ID of the article
  """
  id: ID!
  """
  Whether the article has been marked as read by the user
  """
  isRead: Boolean!
  """
  The URL link to the original article
  """
  link: String!
  """
  The publication date and time of the article
  """
  publishedAt: String
  """
  The title of the article
  """
  title: String!
}

"""
A connection to a list of articles.
"""
type ArticleConnection {
  """
  A list of edges.
  """
  edges: [ArticleEdge!]!
  """
  Information to aid in pagination.
  """
  pageInfo: PageInfo!
}

"""
An edge in a connection.
"""
type ArticleEdge {
  """
  A cursor for use in pagination.
  """
  cursor: String!
  """
  The item at the end of the edge.
  """
  node: Article!
}

"""
An RSS feed subscription
"""
type Feed @key(fields: "id") {
  """
  The articles associated with this feed
  """
  articles(
    """
    The number of articles to retrieve
    """
    first: Int
    """
    The cursor to start retrieving articles from
    """
    after: String
    """
    Filter articles by read status for the authenticated user
    """
    isRead: Boolean
  ): ArticleConnection!
  """
  The internal ID of the feed
  """
  id: ID!
  """
  The date and time the feed was last fetched
  """
  lastFetchedAt: String
  """
  The title of the feed
  """
  title: String!
  """
  The website URL associated with the feed
  """
  website: String!
  """
  The URL of the RSS XML feed
  """
  xmlAddress: String!
}

"""
A connection to a list of feeds.
"""
type FeedConnection {
  """
  A list of edges.
  """
  edges: [FeedEdge!]!
  """
  Information to aid in pagination.
  """
  pageInfo: PageInfo!
}

"""
An edge in a connection.
"""
type FeedEdge {
  """
  A cursor for use in pagination.
  """
  cursor: String!
  """
  The item at the end of the edge.
  """
  node: Feed!
}

"""
The root Mutation type
"""
type Mutation {
  """
  Adds a new RSS feed subscription
  """
  addSubscription(
    """
    The title of the new subscription
    """
    title: String
    """
    The website URL of the subscription
    """
    website: String
    """
    The XML address of the RSS feed
    """
    xmlAddress: String!
  ): Feed!
  """
  Marks an RSS article as read or unread
  """
  markArticleRead(
    """
    The ID of the article to mark as read or unread
    """
    articleId: ID!
    """
    Whether the article should be marked as read or unread
    """
    isRead: Boolean!
  ): Article!
}

"""
The root Query type
"""
type Query {
  """
  Retrieves a list of articles for a specific feed
  """
  feedArticles(
    """
    The ID of the feed to retrieve articles for
    """
    feedId: String!
    """
    The number of articles to retrieve
    """
    first: Int
    """
    The cursor to start retrieving articles from
    """
    after: String
    """
    Filter articles by read status for the authenticated user
    """
    isRead: Boolean
  ): ArticleConnection!
  """
  Retrieves a specific subscription by its feed ID
  """
  subscription(
    """
    The unique identifier of the feed subscription to retrieve
    """
    feedId: String!
  ): Feed!
  """
  Retrieves a list of all feed subscriptions
  """
  subscriptions(
    """
    The number of subscriptions to retrieve
    """
    first: Int
    """
    The cursor to start retrieving subscriptions from
    """
    after: String
    """
    The sorting options for the subscriptions list
    """
    sortBy: SubscriptionSortInput
  ): FeedConnection!
}

"""
Information about pagination in a connection.
"""
type PageInfo @shareable {
  """
  When paginating forwards, the cursor to continue.
  """
  endCursor: String
  """
  When paginating forwards, are there more items?
  """
  hasNextPage: Boolean!
  """
  When paginating backwards, are there more items?
  """
  hasPreviousPage: Boolean!
  """
  When paginating backwards, the cursor to continue.
  """
  startCursor: String
}

"""
The field to sort subscriptions by.
"""
enum SubscriptionSortField {
  """
  Sort by the publication date of the most recent article.
  """
  PUBLISHED_AT
  """
  Sort by the title of the subscription.
  """
  TITLE
}

"""
The direction to sort.
"""
enum SortDirection {
  """
  Sort in ascending order.
  """
  ASC
  """
  Sort in descending order.
  """
  DESC
}

"""
Input for sorting subscriptions.
"""
input SubscriptionSortInput {
  """
  The direction to sort the subscriptions.
  """
  direction: SortDirection!
  """
  The field to sort the subscriptions by.
  """
  field: SubscriptionSortField!
}

extend schema
  @link(
    import: ["@key", "@shareable"]
    url: "https://specs.apollo.dev/federation/v2.0"
  )
