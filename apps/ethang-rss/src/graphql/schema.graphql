type Article @key(fields: "id") {
  content: String
  feedId: String!
  guid: String!
  id: ID!
  link: String!
  publishedAt: String
  title: String!
}

type Feed @key(fields: "id") {
  articles: [Article!]!
  id: ID!
  lastFetchedAt: String
  title: String!
  website: String!
  xmlAddress: String!
}

type Mutation {
  addSubscription(title: String!, website: String!, xmlAddress: String!): Feed!
}

type Query {
  feedArticles(feedId: String!): [Article!]!
  subscriptions: [Feed!]!
}

extend schema
  @link(
    import: ["@key", "@shareable"]
    url: "https://specs.apollo.dev/federation/v2.0"
  )
