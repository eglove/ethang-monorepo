directive @link(url: String!, as: String, import: [String]) repeatable on SCHEMA
directive @shareable on FIELD_DEFINITION | OBJECT

"""Information about pagination in a connection."""
type PageInfo @shareable {
  """When paginating forwards, the cursor to continue."""
  endCursor: String
  """When paginating forwards, are there more items?"""
  hasNextPage: Boolean!
  """When paginating backwards, are there more items?"""
  hasPreviousPage: Boolean!
  """When paginating backwards, the cursor to continue."""
  startCursor: String
}

"""A user's tracking state for a course."""
type CourseTracking @shareable {
  """The canonical URL of the course."""
  courseUrl: String!
  """The unique identifier for the tracking record."""
  id: ID!
  """The current progress status for the course."""
  status: String!
  """The user identifier who owns this tracking record."""
  userId: String!
}

"""Course information"""
type Course @shareable {
  """The author of the course."""
  author: String!
  """Date when the course was created."""
  createdAt: String!
  """The unique identifier for the course."""
  id: ID!
  """The name of the course."""
  name: String!
  """Date when the course was last updated."""
  updatedAt: String!
  """The URL of the course."""
  url: String!
}

"""Learning path containing ordered courses"""
type LearningPath @shareable {
  """The ordered courses in this learning path."""
  courses: [Course!]!
  """Date when the learning path was created."""
  createdAt: String!
  """The unique identifier for the learning path."""
  id: ID!
  """The name of the learning path."""
  name: String!
  """The SWEBOK focus area of the learning path."""
  swebokFocus: String!
  """Date when the learning path was last updated."""
  updatedAt: String!
  """The URL of the learning path."""
  url: String
}

"""A connection to a list of course tracking records."""
type CourseTrackingConnection {
  """A list of edges."""
  edges: [CourseTrackingEdge!]!
  """Information to aid in pagination."""
  pageInfo: PageInfo!
}

"""An edge in a course tracking connection."""
type CourseTrackingEdge {
  """A cursor for use in pagination."""
  cursor: String!
  """The item at the end of the edge."""
  node: CourseTracking!
}

"""The root Mutation type"""
type Mutation {
  """Cycles a course tracking status to the next value."""
  cycleCourseTrackingStatus(
    """The course identifier to update."""
    courseId: String!
    """The user identifier associated with the course tracking."""
    userId: String!
  ): CourseTracking
}

"""The root Query type"""
type Query {
  """Returns a specific course by ID"""
  course(
    """The unique identifier for the course."""
    id: ID!
  ): Course
  """Returns tracking details for a single course and user."""
  courseTracking(
    """The course identifier to look up."""
    courseId: String!
    """The user identifier associated with the course tracking."""
    userId: String!
  ): CourseTracking
  """Returns tracked courses for a user with cursor pagination."""
  courseTrackings(
    """The cursor to start retrieving course trackings from."""
    after: String
    """The number of course trackings to retrieve. Omit to return all."""
    first: Int
    """The user identifier whose course trackings are requested."""
    userId: String!
  ): CourseTrackingConnection!
  """Returns all courses"""
  courses: [Course!]!
  """Returns a specific learning path by ID"""
  learningPath(
    """The unique identifier for the learning path."""
    id: ID!
  ): LearningPath
  """Returns all learning paths with their courses"""
  learningPaths: [LearningPath!]!
}

extend schema
  @link(
    import: ["@shareable"]
    url: "https://specs.apollo.dev/federation/v2.0"
  )
