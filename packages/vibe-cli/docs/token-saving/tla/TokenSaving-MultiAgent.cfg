INVARIANT ResolvedModelValid
INVARIANT DoneImpliesRoutingDone
INVARIANT InvokeRequiresModel
INVARIANT NodeDuplicateDetectionIsAccurate
INVARIANT EdgeDuplicateDetectionIsAccurate
INVARIANT PlainReadNeverIntercepted
INVARIANT EsHookOnlyForFind
INVARIANT RgHookOnlyForGrep
INVARIANT HookCleanupComplete
INVARIANT GraphTerminalClean
INVARIANT HookErrorAllowsCompletion
INVARIANT AgentsCompletedBounded
INVARIANT GraphOpsCountBounded
INVARIANT RetryCountClean
INVARIANT NoGhostEdges
