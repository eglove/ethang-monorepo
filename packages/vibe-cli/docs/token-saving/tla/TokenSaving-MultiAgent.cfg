SPECIFICATION Spec

\* =============================================================================
\* TokenSaving-MultiAgent.cfg — Second TLC configuration (Revision 20 — O-8 fix)
\*
\* PURPOSE:
\*   Exercises the cross-epoch "collecting" return branch of GraphWriteSuccess and
\*   GraphWriteFail, providing partial TLC verification for the five properties
\*   declared unverified in ASSUME D31 (MaxAgents=1 scope limitation):
\*     S25 (PipelineCompletionRequiresAllAgents) — multi-epoch completion guard
\*     S30 (GraphNodesMonotone)                  — cross-epoch node accumulation
\*     S31 (GraphEdgesMonotone)                  — cross-epoch edge accumulation
\*     L4  (DuplicateEventuallyResolves)         — dedup resolution with epoch return
\*     L5  (GraphEventuallyFinishes)             — multiple collecting re-entries
\*
\* CONFIGURATION CHOICES:
\*   MaxAgents   = 2   — two-agent run; exercises the GraphWriteSuccess/Fail
\*                       "collecting" ELSE branch (agentsCompleted+1 < MaxAgents)
\*   MaxGraphOps = 3   — same as primary .cfg; sufficient for dedup path coverage
\*   MaxRetries  = 1   — reduced from 3 to keep state space tractable at MaxAgents=2;
\*                       the 3-retry ladder is fully exercised in the primary .cfg
\*
\* COMPLEMENTARY SCOPE (not redundant with primary .cfg):
\*   This configuration verifies multi-epoch accumulation paths.
\*   The primary .cfg (MaxRetries=3) verifies the full force-dedup retry ladder.
\*   The two configurations are complementary: each covers paths the other cannot.
\*
\* STATE-SPACE RATIONALE:
\*   With MaxAgents=2, graphNodes and graphEdges can accumulate across two epochs.
\*   NodePaths={p1,p2} keeps the graphEdges subset space at 2^4=16 per epoch.
\*   MaxRetries=1 limits the dedup retry ladder to one cycle per dedup event,
\*   reducing the branching factor in the dedup machine to prevent explosion from
\*   the combined effect of two-epoch accumulation and multi-step retry paths.
\*
\* ROUTING-ONLY PROPERTIES (L9/L11) — unaffected by MaxAgents (see D31 in .tla):
\*   L9  (ResolvingLeadsToInvokingOrError) and L11 (ValidatingLeadsToResolvingOrError)
\*   depend only on routingState, mappingEntryExists, and inputRole. Their reachable
\*   value space is independent of MaxAgents and they are fully verified in both cfgs.
\*
\* SYMMETRY is intentionally omitted: TLC warns that symmetry reduction during
\* liveness checking is unsafe and can cause missed property violations.
\* =============================================================================

\* --- Numeric constants ---

\* MaxRetries = 1: reduced from the primary configuration's MaxRetries=3.
\* One retry cycle is sufficient to exercise the dedup_error → retrying →
\* building path within a multi-agent run. The full 3-retry ladder is exercised
\* in the primary TokenSaving.cfg. Do not raise MaxRetries here without first
\* verifying the state space remains tractable (MaxAgents=2 already multiplies
\* the graphNodes/graphEdges accumulation factor).
CONSTANT MaxRetries = 1

\* MaxAgents = 2: exercises the cross-epoch "collecting" return branch.
\* GraphWriteSuccess and GraphWriteFail branch on (agentsCompleted+1 >= MaxAgents):
\*   With MaxAgents=1: always TRUE  → always transitions to terminal "done"/"warn"
\*   With MaxAgents=2: agent 1 write → "collecting" (ELSE branch); agent 2 write → terminal
\* The ELSE branch was structurally unreachable under MaxAgents=1. This is the
\* critical coverage gap that this second configuration addresses.
CONSTANT MaxAgents = 2

\* MaxGraphOps = 3: same as primary .cfg. Sufficient to make the edge dedup retry
\* path reachable (required for D1/O2 fix coverage) and to keep graphOpsCount-bounded
\* epoch termination tractable. Do not increase without profiling state space size.
CONSTANT MaxGraphOps = 3

\* --- Sentinels (model values) ---
CONSTANT NULL = NULL
CONSTANT InvalidRole = InvalidRole

\* --- Valid roles (model values) ---
\* NOTE: DocWriter and CodeWriter normalize BDD hyphenated strings
\* "doc-writer" and "code-writer". See ASSUME D16 in the .tla file.
CONSTANT Elicitor  = Elicitor
CONSTANT DocWriter = DocWriter
CONSTANT Expert    = Expert
CONSTANT Moderator = Moderator
CONSTANT Reviewer  = Reviewer
CONSTANT CodeWriter = CodeWriter

\* --- Valid models (model values) ---
CONSTANT Opus   = Opus
CONSTANT Sonnet = Sonnet
CONSTANT Haiku  = Haiku

\* --- Node paths for knowledge graph ---
\* Two model values retained from primary .cfg. With MaxAgents=2, each epoch
\* can add nodes from {p1,p2}; cross-epoch accumulation means graphNodes may
\* reach {p1,p2} after epoch 1, leaving no new nodes for epoch 2's GraphAddNode.
\* This is a valid (and structurally interesting) path: epoch 2 proceeds directly
\* to GraphWriteMarkdown without adding new nodes. TLC exercises this path.
CONSTANT NodePaths = {p1, p2}

