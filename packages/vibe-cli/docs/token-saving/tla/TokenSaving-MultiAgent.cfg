PROPERTY GraphEdgesMonotone
PROPERTY CloseHookPrecedesNextEpoch
PROPERTY WritingStateGatesAgentsCompleted
PROPERTY GraphHaltCleanupPreservesMarkdown
PROPERTY MarkdownStateMonotone

