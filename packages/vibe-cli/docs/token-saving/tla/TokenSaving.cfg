SPECIFICATION Spec

\* --- Numeric constants ---

\* MaxRetries = 3: covers the full 3-retry ladder documented in BDD and the
\* force-dedup boundary (retryCount reaching MaxRetries=3 triggering
\* GraphForceDedup). Raised in Revision 9 (D4 fix).
CONSTANT MaxRetries = 3

\* MaxAgents = 1: models a single-agent close-hook write. Sufficient to verify
\* all graph liveness properties and the S25 completion invariant.
CONSTANT MaxAgents = 1

\* MaxGraphOps = 3: raised from 2 in Revision 9 (D1 fix).
\* With MaxGraphOps=3, the edge dedup retry path becomes reachable and TLC
\* verifies the D1 fix (GraphRetryEdgeSuccess restricted to graphNodes endpoints).
CONSTANT MaxGraphOps = 3

\* --- Sentinels (model values) ---
CONSTANT NULL = NULL
CONSTANT InvalidRole = InvalidRole

\* --- Valid roles (model values) ---
\* NOTE: DocWriter and CodeWriter normalize BDD hyphenated strings
\* "doc-writer" and "code-writer". See ASSUME D16 in the .tla file.
CONSTANT Elicitor  = Elicitor
CONSTANT DocWriter = DocWriter
CONSTANT Expert    = Expert
CONSTANT Moderator = Moderator
CONSTANT Reviewer  = Reviewer
CONSTANT CodeWriter = CodeWriter

\* --- Valid models (model values) ---
CONSTANT Opus   = Opus
CONSTANT Sonnet = Sonnet
CONSTANT Haiku  = Haiku

\* --- Node paths for knowledge graph.
\*
\* Two model values are sufficient to exercise every structural branch:
\*   - Normal add (both distinct paths)
\*   - Duplicate detection (same path submitted twice)
\*   - Retry with distinct replacement (p1 duplicates, retry succeeds with p2)
\*   - Force-dedup (both p1,p2 in graphNodes; retry cannot find unique path)
\*   - Self-edge (<<p1,p1>> after p1 accepted, satisfying D1/O2 ghost-edge fix)
\*   - Edge dedup retry (<<p1,p1>> dup; retry with <<p1,p2>> if p2 accepted)
\*
\* THREE NODES CAUSED STATE SPACE EXPLOSION (even with MaxGraphOps=2):
\*   NodePaths={p1,p2,p3} -> graphEdges subsets: 2^9 = 512
\*   NodePaths={p1,p2}    -> graphEdges subsets: 2^4 =  16  (32x reduction)
\*
\* L5 (GraphEventuallyFinishes) requires NodePaths to be bounded AND
\* MaxGraphOps to be finite. {p1,p2} with MaxGraphOps=3 satisfies both.
\* Do not increase NodePaths cardinality without verifying L5 still terminates.
CONSTANT NodePaths = {p1, p2}

\* SYMMETRY is intentionally omitted: TLC warns that symmetry reduction
\* during liveness checking is unsafe and can cause missed property violations.

\* --- Safety invariants (state predicates) ---
INVARIANT TypeOK
INVARIANT UnknownRoleNeverInvokes
INVARIANT MissingMappingNeverInvokes
INVARIANT NoHookFallback
INVARIANT RetryBounded
INVARIANT ForceOnlyAfterRetries
INVARIANT HaltedMeansRoutingError
INVARIANT ResolvedModelValid
INVARIANT DoneImpliesRoutingDone
INVARIANT InvokeRequiresModel
INVARIANT NodeDuplicateDetectionIsAccurate
INVARIANT EdgeDuplicateDetectionIsAccurate
INVARIANT PlainReadNeverIntercepted
INVARIANT EsHookOnlyForFind
INVARIANT RgHookOnlyForGrep
INVARIANT HookCleanupComplete
INVARIANT GraphTerminalClean
INVARIANT HookErrorAllowsCompletion
INVARIANT AgentsCompletedBounded
INVARIANT GraphOpsCountBounded
INVARIANT RetryCountClean
INVARIANT NoGhostEdges
\* D5: pipeline done requires all agents completed
INVARIANT PipelineCompletionRequiresAllAgents
\* D13/R11/R13: pendingKind/pendingNode/pendingEdge coherence + retrying + building state guards
INVARIANT PendingCoherence
\* R11: hookKind preserved in error state (D15 companion)
INVARIANT HookErrorPreservesKind
\* R11: named audit property for inter-hook mutual exclusion
INVARIANT InterHookMutualExclusion
\* R14: terminal graph states (done,warn) have graphOpsCount=0
INVARIANT GraphTerminalOpsClean
\* R15: hook error terminal always has hookCommand cleared (symmetric to S15)
INVARIANT HookErrorClearsCommand
\* R19: writing state requires agentsCompleted < MaxAgents (O-6 fix — S38)
INVARIANT WritingAgentsCompletedBound

\* --- Temporal safety properties (absorbing-state and action-level invariants) ---
\* D3/O3: hook terminal states are absorbing (single-intercept model)
PROPERTY HookTerminalIsAbsorbing
\* O7: pipeline terminal states are absorbing (no halted->running regression)
PROPERTY HaltedIsAbsorbing
PROPERTY DoneIsAbsorbing
\* D6: hookState=error /\ pipelineState=halted is jointly absorbing
PROPERTY HookErrorHaltedIsJointlyAbsorbing
\* R11: graphNodes never shrinks (multi-agent accumulation guarantee)
PROPERTY GraphNodesMonotone
\* R11: graphEdges never shrinks (multi-agent accumulation guarantee)
PROPERTY GraphEdgesMonotone
\* R11: agentsCompleted increments only from graphState="writing" (post-condition form — S32)
PROPERTY CloseHookPrecedesNextEpoch
\* R18: graphState /= "writing" implies agentsCompleted unchanged (contrapositive form — S37)
PROPERTY WritingStateGatesAgentsCompleted
\* R12: GraphHaltCleanup preserves markdownState across all 7 active entry states
PROPERTY GraphHaltCleanupPreservesMarkdown
\* R12: markdownState never regresses from stale/current to none
PROPERTY MarkdownStateMonotone

\* --- Liveness properties ---
PROPERTY PipelineTerminates
PROPERTY ValidRoleLeadsToModel
PROPERTY InvalidRoleLeadsToHalt
PROPERTY MissingMappingLeadsToHalt
PROPERTY DuplicateEventuallyResolves
PROPERTY DuplicateEventuallyResolvedFully
PROPERTY GraphEventuallyFinishes
PROPERTY HookEventuallySettles
PROPERTY HookErrorEventuallyCompletsPipeline
\* R11: invoking state eventually reaches routing done
PROPERTY InvokingLeadsToDone
\* R14: resolving state eventually reaches invoking or error (analogue of L8)
PROPERTY ResolvingLeadsToInvokingOrError
\* R14: writing state eventually advances (GraphWriteSuccess or GraphWriteFail)
PROPERTY WritingLeadsToNextState
\* R15: validating state eventually reaches resolving or error (completes liveness chain)
PROPERTY ValidatingLeadsToResolvingOrError
\* R18: building state eventually advances to collecting, dedup_error, or warn (T-1 rename — L12)
PROPERTY BuildingLeadsToCollectingOrDedupErrorOrWarn
\* R19: retrying state eventually advances to building, dedup_error, or warn (O-1 fix — L13)
PROPERTY RetryingLeadsToBuildingOrDedupError
\* R20: intercepting state eventually advances to rewriting (O-1 fix — L14)
PROPERTY InterceptingLeadsToRewriting
