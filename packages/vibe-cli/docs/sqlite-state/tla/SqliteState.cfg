SPECIFICATION Spec

\* Reduced model for tractable checking.
\* Real system has MaxStage=7 with debate stages 2-6 and coding stage 7.
\* This model uses MaxStage=3: stage 1 (no debate), stage 2 (debate),
\* stage 3 (coding/tiers).  All dynamics are preserved with far fewer states.
\* Single feature avoids combinatorial explosion from independent feature lifecycles.
\*
\* Revision 13 changes from Revision 12:
\*   - T3: S20 performance note fixed — the previously suggested non-ENABLED
\*     "equivalent" formulation was a tautology (crashCount >= MaxCrashes
\*     makes the consequent vacuously true).  No non-ENABLED equivalent
\*     exists; recommendation changed to "remove S20 entirely" if ENABLED
\*     cost becomes prohibitive.
\*   - T4: Merge abstraction cross-reference added to NAMING BRIDGE table
\*     (mergeStatus is per-tier in TLA+, per-task_id in BDD).
\*   - T5: VARIABLE-TO-AGGREGATE OWNERSHIP block added after VARIABLES,
\*     explicitly mapping each TLA+ variable to its database table aggregate.
\*   - T6: SCHEMA MIGRATION note added to INTENTIONAL ABSTRACTION BOUNDARY —
\*     column additions require manual vibe-state.db deletion (no ALTER TABLE).
\*   - T2: ForceUnlock IDLE FEATURE RECOVERY PATH documented — idle feature
\*     regains session via SetActiveFeature(SF) after operator re-invokes.
\*   - T1: ProcessCrash UNCONDITIONAL activeFeature CLEAR documented — TLA+
\*     is intentionally looser than BDD (safe, no false positives).
\*
\* Revision 12 changes from Revision 11:
\*   - NAMING BRIDGE table added to .tla header: maps all 13 TLA+ variables
\*     to their BDD/database column equivalents, highlighting the
\*     featureStatus↔features.status / pipelineState↔pipeline_state.pipeline_state
\*     naming inversion that previously caused false-cognate confusion.
\*   - DOMAIN RULE comments added to AcquireLock and HaltPipeline explaining
\*     WHY cross-aggregate atomicity is required from a domain perspective:
\*     AcquireLock: "A feature is running iff it holds the lock AND pipeline
\*     is active" — three writes are one indivisible domain event.
\*     HaltPipeline: "Halting is an irreversible atomic event that closes all
\*     open work" — partial halting would orphan debates/tiers.
\*   - New invariant: NoneStateConsistent (S23) — featureStatus = "none"
\*     implies pipelineState = "none".  Closes the sync coverage gap:
\*     S5/S17/S18/S19/S23 now cover ALL five featureStatus domain values.
\*   - S20 (CrashBudgetEnforced) ENABLED PERFORMANCE NOTE: documents that
\*     ENABLED ProcessCrash(f) has higher TLC cost than simple predicates.
\*     At current bounds (Features={f1}, MaxCrashes=2) overhead is negligible.
\*
\* Revision 11 changes from Revision 10:
\*   - ForceUnlock livelock fix: running features now transition to "halted"
\*     (not "idle"), breaking the AcquireLock → ForceUnlock → SetActiveFeature
\*     → AcquireLock lasso that violated L1–L4.
\*   - ForceUnlock now performs full HaltPipeline-style cleanup: fails pending
\*     debates, cleans up running/pending tiers, resets pending merges.
\*
\* Revision 10 changes from Revision 9:
\*   - S3 (StageMonotonic) REMOVED from INVARIANT list — redundant with TypeOK
\*     range constraint.  Monotonicity verified by L6 (StageNeverDecreases).
\*   - ForceUnlock action added — models BDD "Unlock-PipelineState with force
\*     flag" (line 445).  No fairness (operator-initiated manual intervention).
\*     UPDATE (Revision 11): ForceUnlock now halts running features.
\*   - New invariant: NoneTierNoTasks (S21) — tierStatus = "none" implies
\*     tierTasksDone = 0.  Guards against orphaned task counts.
\*   - New invariant: RunningTierNoVerdict (S22) — tierStatus = "running"
\*     implies gateVerdict = "none".  Guards against verdict-without-transition.
\*
\* Revision 9 changes from Revision 8:
\*   - New invariant: CrashBudgetEnforced (S20) — formal ENABLED-based check
\*     that ProcessCrash is disabled at MaxCrashes (replaces prose-only doc)
\*   - S11 (DebateStageConsistency) extended: all non-"none" consensus values
\*     now require StageNeedsDebate(s), not just "pending"
\*   - S3 (StageMonotonic) documented as range-bound half; StageNeverDecreases
\*     (L6) added as temporal property for explicit monotonicity
\*     UPDATE (Revision 10): S3 removed entirely — see above.
\*   - AcquireLock guard simplified: "running" branch removed (dead code)
\*   - L5 comment corrected: MergeConflict cited as "possible" not "guaranteed"
\*   - ProcessCrash mergeStatus="merged" discard documented (intentional)
\*
\* Revision 8 changes from Revision 7:
\*   - New invariant: IdleStateConsistent (S19) — featureStatus = "idle"
\*     implies pipelineState = "none".  Completes the full sync coverage
\*     (S5 halted, S17 running, S18 complete, S19 idle).
\*   - Documentation-only changes in .tla:
\*     - Crash-resume-mid-Stage-7 path documented (EnterStage7 blocked
\*       post-crash; StartTier is the correct resume entry point)
\*     - L5 liveness anchor documented (WF(CompleteMerge) drives resolution)
\*     - Merge abstraction documented (per-tier vs. per-task_id)
\*     - Abstraction boundary expanded to include pipelineState runtime
\*       columns (review_round, verdict, current_stage)
\*
\* Revision 7 changes from Revision 6:
\*   - HaltPipeline pending-tier cleanup: resets "pending" tiers to "none"
\*     on halt, fixing TierSequentialOrder (S12) Part B violation where a
\*     taskless running tier reset to "none" left later pending tiers
\*     orphaned.
\*
\* Revision 6 changes from Revision 5:
\*   - MaxCrashes=2 (D7): enables CI verification of multi-crash recovery
\*     sequences and L3 conditional behavior.  MaxCrashes=1 left only one
\*     crash-free continuation path after the single recovery; MaxCrashes=2
\*     exercises the crash→resume→crash→resume→complete chain.
\*   - AdvanceTier removed: sequential ordering now enforced by StartTier
\*     guard (D13).  Bulk tier initialization (D8) makes AdvanceTier
\*     unnecessary.
\*   - Two new invariants: RunningStateConsistent (S17), CompleteStateConsistent
\*     (S18) for full pipelineState/featureStatus sync verification (D1).
CONSTANTS
    Features = {f1}
    MaxStage = 3
    MaxDebateRound = 2
    Tiers = {1, 2}
    MaxTasks = 1
    MaxCrashes = 2
    NULL = NULL

INVARIANT TypeOK
INVARIANT SingleRunningFeature
INVARIANT LockExclusive
\* S3 (StageMonotonic) REMOVED in Revision 10 — redundant with TypeOK range
\* constraint.  See S3 removal note in .tla file.
INVARIANT NoCompletionWithoutAllStages
INVARIANT HaltedStateConsistent
INVARIANT TierPassRequiresTasks
INVARIANT GateVerdictConsistent
INVARIANT ActiveFeatureMustExist
INVARIANT RunningImpliesLockHeld
INVARIANT DbOpenWhenActive
INVARIANT DebateStageConsistency
INVARIANT TierSequentialOrder
INVARIANT TierFailRequiresTasks
INVARIANT MergeStatusConsistent
INVARIANT GateRequiresMerge
INVARIANT HaltedNoRunningTiers
INVARIANT RunningStateConsistent
INVARIANT CompleteStateConsistent
INVARIANT IdleStateConsistent
INVARIANT CrashBudgetEnforced
\* NOTE: CrashBudgetEnforced uses ENABLED ProcessCrash(f), which has higher
\* TLC evaluation cost than simple state predicates.  At current bounds
\* (Features={f1}, MaxCrashes=2) the overhead is negligible.  If scaling to
\* larger Features sets or higher MaxCrashes, consider REMOVING S20 entirely
\* rather than replacing it — no non-ENABLED equivalent exists (the previously
\* suggested formulation was a tautology; see T3 Revision 13 note in .tla).
INVARIANT NoneTierNoTasks
INVARIANT RunningTierNoVerdict
INVARIANT NoneStateConsistent

PROPERTY EventualTermination
PROPERTY DebateTermination
PROPERTY DatabaseEventuallyCloses
PROPERTY LockEventuallyReleased
PROPERTY MergeEventuallyResolves
PROPERTY StageNeverDecreases

\* SYMMETRY Features_symm
\* Symmetry is unsafe during liveness checking and can cause TLC to miss
\* violations of temporal properties. With a single feature it provides
\* no benefit anyway.
