SPECIFICATION Spec

\* Terminal states ("halted", "completed") are legitimate endpoints with no
\* enabled Next actions.  The EventuallyTerminates liveness property already
\* proves the pipeline always reaches one of these states.
CHECK_DEADLOCK FALSE

\* =========================================================================
\* Constants -- small values for tractable model checking
\* =========================================================================

CONSTANTS
    Tasks = {1, 2, 3}
    Tiers <- TiersConst
    NumTiers = 2
    WriterType <- WriterTypeConst
    MaxRedRetries = 2
    MaxTddCycles = 2
    MaxFixRounds = 2
    MaxMergeRetries = 2
    CleanupPasses = 2

\* =========================================================================
\* Invariants (Safety Properties)
\* =========================================================================

INVARIANT TypeOK
INVARIANT TiersSequential
INVARIANT RetryBounds
INVARIANT AgentWriterNoTdd
INVARIANT MergeSerial
INVARIANT NoOrphanedWorkspaces
INVARIANT SingleTaskNoWorkspace
INVARIANT CompletionRequiresFinalVerif
INVARIANT EscalationBlocksProgress
INVARIANT GreenAfterRed
INVARIANT CleanupOnlyForTdd
INVARIANT ValidationGatesExecution
INVARIANT WorkspaceCreationSafety

\* =========================================================================
\* Liveness Properties
\* =========================================================================

PROPERTY EventuallyTerminates
PROPERTY TasksResolve
PROPERTY EscalationResolves
