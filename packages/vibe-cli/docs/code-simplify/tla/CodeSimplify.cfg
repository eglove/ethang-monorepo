SPECIFICATION Spec

\* Small values for tractable model checking
CONSTANTS
    MaxTiers = 2
    MaxTasksPerTier = 2
    MaxDoublePassRetries = 2
    MaxReviewRounds = 2
    NumReviewers = 3

\* Type invariant
INVARIANT TypeOK

\* Safety properties
INVARIANT LockReleasedOnTermination
INVARIANT LockHeldDuringExecution
INVARIANT DoublePassRetriesInBounds
INVARIANT ReviewRoundsInBounds
INVARIANT OutcomeConsistency
INVARIANT ConsecutivePassBound

\* Safety: no re-review after merge conflict resolution (action property)
PROPERTY NoReReviewAfterConflict

\* Liveness properties
PROPERTY EventualTermination
PROPERTY GlobalReviewLeadsToEnd
PROPERTY EscalationEventuallyResolved
PROPERTY LockEventuallyReleased
