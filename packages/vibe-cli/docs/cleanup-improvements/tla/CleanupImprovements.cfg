SPECIFICATION Spec

\* Small model for tractable checking
CONSTANTS
    T1 = T1
    T2 = T2
    T3 = T3
    Tasks = {T1, T2, T3}
    MaxTiers = 2
    TierAssignment <- MC_TierAssignment
    MaxTDDCycles = 3
    MaxCoverageIter = 2
    MaxRetries = 2
    NumStages = 4
    FixtureGenAfter <- MC_FixtureGenAfter
    MaxCrashes = 2

\* Safety invariants
INVARIANT TypeOK
INVARIANT WardenRequiresWorktree
INVARIANT AgentRequiresWarden
INVARIANT MergeMutexExclusive
INVARIANT TierAdvanceRequiresCompletion
INVARIANT TasksOnlyInCurrentTier
INVARIANT CoverageCapRespected
INVARIANT TDDCapRespected
INVARIANT LockHeldDuringExecution
INVARIANT FixturesPrecondition
INVARIANT CounterBounded
INVARIANT AbortReleasesLock
INVARIANT NoExecutionAfterAbort
INVARIANT MergedWorktreeCleanedUp
INVARIANT StaleLockNotExecuting
INVARIANT CrashBudgetRespected

\* Liveness temporal properties
PROPERTY PipelineEventuallyCompletes
PROPERTY AbortEventuallyCleanedUp
PROPERTY TasksEventuallyTerminate
PROPERTY TiersEventuallyComplete

\* Symmetry disabled: TLC warns symmetry during liveness checking may
\* cause missed violations. The Symmetry set is still defined in the .tla
\* file and can be re-enabled for safety-only runs.
\* SYMMETRY Symmetry
