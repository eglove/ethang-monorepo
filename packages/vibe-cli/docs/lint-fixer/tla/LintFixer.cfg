SPECIFICATION Spec

\* Scaled-down constants for feasible model checking.
\* Structural properties (bounded loops, valid transitions, termination)
\* hold at any scale. Production values: MaxAttempts=5, MaxVMIterations=10.
CONSTANTS
    MaxViolations = 3
    MaxAttempts = 3
    MaxVMIterations = 3

\* Safety invariants
INVARIANT TypeOK
INVARIANT VMIterationBounded
INVARIANT ValidTerminalResult
INVARIANT NoEmptyCommit
INVARIANT CleanMeansNoWork
INVARIANT AllViolationsHandled
INVARIANT CleanMeansNoViolations
INVARIANT CommitRequiresModification
INVARIANT ResultOnlyAtTerminal
INVARIANT VMIterationNotPremature

\* Liveness properties
PROPERTY EventuallyTerminates
PROPERTY EventuallyProducesResult
PROPERTY ViolationsEventuallyHandled
