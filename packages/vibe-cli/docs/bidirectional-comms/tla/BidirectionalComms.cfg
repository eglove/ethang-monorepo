\* ---- State-space budget (OBJ-14(v9), updated v12) ----
\*
\* v8 base:
\*   MaxEvtId  = 4
\*   Agents    = {a1, a2}     — 2 agents
\*   Handlers  = {h1}         — 1 handler
\*   Worktrees = {wt1}        — 1 worktree
\*   GroupIds  = {g1}         — 1 group
\*
\* v9 new variable contributions (with Worktrees={wt1}, Handlers={h1}):
\*
\*   rollbackTargetWorktree: Worktrees ∪ {NULL} = {wt1, NULL}
\*     → x2 over v8
\*
\*   handlerPendingEpoch: [h1 -> (1..5) ∪ {NULL}] = 6 values per handler
\*     → x6 naive; BUT HandlerStateConsistency correlates epoch=NULL iff
\*       handlerState="idle", so effective factor is ~x2 (busy vs idle).
\*
\*   Combined naive factor: ~x12 over v8.
\*   Effective factor (accounting for invariant correlation): ~x4 over v8.
\*   Cumulative from v7: ~x16 over v7 (v8 was ~x4 over v7; v9 is ~x4 over v8).
\*
\* v11 new variable contribution:
\*
\*   consensusRoundStart: 1..(MaxEvtId+1) = {1, 2, 3, 4, 5} — 5 values.
\*     → x5 naive; BUT consensusRoundStart only advances on rollback (RouterExecutesRollback
\*       or RouterHaltsRollbackSqliteError).  In practice it correlates tightly with
\*       consensusState = "open" and nextEvtId >= consensusRoundStart, restricting
\*       reachable combinations.  Effective factor: ~x2–x3 over v10.
\*
\* Partial offsets (v12):
\*   OBJ-LOW-1(v12) ConsensusRoundStartMonotone is a pure INVARIANT (no new variables);
\*                  no state-space impact.
\*   OBJ-LOW-2(v12) UserRequestsRollback guard tightened (removed "halted" path):
\*                  eliminates the halted+rollbackRequested WF loop; small reduction in
\*                  reachable paths from halted states with snapshots.
\*
\* Partial offsets (v11):
\*   OBJ-EC-2(v10) drain guard on RouterHaltsRollbackSqliteError restricts its start states.
\*   OBJ-A(v10) epoch-scoped guard in ModeratorEmitsCandidate reduces reachable paths.
\*   RouterAbortsStaleRollback is enabled only in the halted+rollbackRequested corner, which
\*   is a small fraction of halted states.
\*
\* Partial offsets (inherited from v9):
\*   OBJ-8(v9) drain guard restricts RouterExecutesRollback start states.
\*   OBJ-3(v9) snapshot guard restricts RouterTakesSnapshot.
\*   OBJ-10(v9) ground-truth guard restricts ModeratorEmitsCandidate paths.
\*   OBJ-9(v9) epoch guard in HandlerAdapterCompletes eliminates spurious completions.
\*
\* SYMMETRY note: intentionally omitted.
\*   TLC warns that symmetry reduction is unsound for liveness checking.
\*   Since this config checks PROPERTY entries, correctness takes priority.
\*
\* CHECK_DEADLOCK FALSE:
\*   busStatus="halted" is an intentional terminal state.  busStatus="resuming"
\*   is also valid if no agent is "dead" (BusResumed fires immediately).
\*   Both suppress Next; deadlock detection is off to avoid spurious reports.

SPECIFICATION Spec

\* --- Concrete constant values ---

CONSTANTS
    Agents    = {a1, a2}
    Handlers  = {h1}
    Worktrees = {wt1}
    GroupIds  = {g1}
    MaxEvtId  = 4
    NULL      = NULL

\* --- Deadlock suppression ---
CHECK_DEADLOCK FALSE

\* --- Type invariant ---
INVARIANT TypeOK

\* --- Safety invariants ---
INVARIANT NoDuplicateEvtId
INVARIANT DeadAgentReceivesNoMessages
INVARIANT RatificationRequiresNoUnoverriddenObjections
INVARIANT OnlyDefinedHalts
INVARIANT CommitLockHolderAliveOrBusHalted
INVARIANT EvtIdMonotone
INVARIANT SpawningAgentOnlyReceivesBootstrap
INVARIANT ExactlyOneBootstrapPerLifetime
INVARIANT GroundTruthPrecedesAgentMessage
INVARIANT OverrideIntegrity
INVARIANT CommitIdempotency
INVARIANT AllGroupRepliesHaveSentEvents
INVARIANT BusRunningImpliesLockHeld
INVARIANT ConsensusEventsRoutedThroughBus
INVARIANT MechanicalHaltHasCategory
INVARIANT PendingProtocolErrorImpliesAgentAlive
INVARIANT CandidateHasEventInLog
INVARIANT TypeSenderACL
INVARIANT HandlerStateConsistency
INVARIANT RollbackRequiresSnapshot
INVARIANT ConsensusRoundStartMonotone
INVARIANT NoOrphanedHandlerForDeadAgent

\* --- Liveness properties ---
PROPERTY AgentsEventuallyAlive
PROPERTY CandidateEventuallyResolves
PROPERTY CommitLockEventuallyReleased
PROPERTY ProtocolErrorEventuallyResolved
PROPERTY RollbackEventuallyCompletes
