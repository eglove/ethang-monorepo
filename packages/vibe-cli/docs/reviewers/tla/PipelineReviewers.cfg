SPECIFICATION Spec

\* Small values for model checking — keeps state space tractable
\* while exercising all counter boundaries and interactions

CONSTANTS
    MaxReviewRounds = 2
    MaxKeepGoingResets = 2
    MaxTddKeepGoingPerGate = 2
    NumTasks = 2
    NULL = NULL

\* Safety invariants
INVARIANT TypeOK
INVARIANT LockReleasedInTerminal
INVARIANT LockHeldWhileActive
INVARIANT ReviewRoundBounded
INVARIANT KeepGoingResetsBounded
INVARIANT TddKeepGoingBounded
INVARIANT TaskCountBounded
INVARIANT FinalReviewRequiresAllMerged
INVARIANT GlobalTimeoutHalts

\* Liveness properties (require fairness — Spec includes WF)
PROPERTY EventuallyTerminates
PROPERTY ReviewGateResolves
PROPERTY FinalReviewResolves
PROPERTY AllTasksResolve
