schema:
  - "../../apps/ethang-courses/src/graphql/schema.graphql"
  - "../../apps/ethang-rss/src/graphql/schema.graphql"
plugins:
  - "@graphql-codegen/typescript"
  - "@graphql-codegen/typescript-operations"

documents:
  - "../../apps/ethang-react/src/**/*.{ts,tsx}"

generates:
  "__generated__/":
    preset: "client"
    config:
      useTypeImports: true
    presetConfig:
      gqlTagName: "gql"
      fragmentMaking: false
  courses.ts:
    plugins:
      - "@graphql-codegen/typescript"
  rss.ts:
    plugins:
      - "@graphql-codegen/typescript"
