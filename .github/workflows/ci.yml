name: CI

on:
  pull_request:
    branches: [master]
  merge_group:

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: git diff --exit-code

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  tlc:
    # TLA+ model checking for vibe-cli specs. ubuntu-latest ships a JDK; grab
    # nightly TLC inline (pattern borrowed from github.com/lemmy/BlockingQueue).
    name: TLC (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: BidirectionalComms,    dir: bidirectional-comms,  spec: BidirectionalComms,  cfg: BidirectionalComms.cfg }
          - { label: CleanupImprovements,   dir: cleanup-improvements, spec: CleanupImprovements, cfg: CleanupImprovements.cfg }
          - { label: CodeSimplify,          dir: code-simplify,        spec: CodeSimplify,        cfg: CodeSimplify.cfg }
          - { label: CodingStage,           dir: coding-stage,         spec: CodingStage,         cfg: CodingStage.cfg }
          - { label: ParallelDebates,       dir: parallel-debates,     spec: ParallelDebates,     cfg: ParallelDebates.cfg }
          - { label: PipelineReviewers,     dir: reviewers,            spec: PipelineReviewers,   cfg: PipelineReviewers.cfg }
          - { label: SqliteState,           dir: sqlite-state,         spec: SqliteState,         cfg: SqliteState.cfg }
          - { label: TokenSaving,           dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving.cfg }
          - { label: TokenSaving-MultiAgent, dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving-MultiAgent.cfg }
    env:
      TLC_JAR: ${{ github.workspace }}/tla2tools.jar
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Get TLC jar
        run: wget -q https://nightly.tlapl.us/dist/tla2tools.jar -O "$TLC_JAR"
      - name: Run TLC on ${{ matrix.label }}
        shell: pwsh
        run: |
          pwsh packages/vibe-cli/tools/run-tlc.ps1 `
            -Spec   "packages/vibe-cli/docs/${{ matrix.dir }}/tla/${{ matrix.spec }}.tla" `
            -Config "packages/vibe-cli/docs/${{ matrix.dir }}/tla/${{ matrix.cfg }}" `
            -Timeout 600

  codeql:
    permissions:
      contents: read
      security-events: write
      actions: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          category: /language:${{ matrix.language }}

  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9  # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
