name: vibe-cli

on:
  push:
    paths:
      - 'packages/vibe-cli/**'
  pull_request:
    paths:
      - 'packages/vibe-cli/**'
  schedule:
    - cron: '0 0 1 */3 *'  # quarterly for rollback rehearsal

defaults:
  run:
    shell: pwsh
    working-directory: packages/vibe-cli

# Unit/integration/property/contract/mutation/e2e/bdd tests, code coverage,
# and ratcheting run in .github/workflows/ci.yml via `pnpm test` + `pnpm lint`.
# This workflow owns vibe-cli-specific gates that aren't expressible as a
# Pester/vitest/eslint pass: PowerShell tool scripts, TLA+ model checking,
# and invariant audits.

# ─── Group 1: Static analysis (7 jobs) ───────────────────────────────────────
# Approved-verb enforcement is handled by PSScriptAnalyzer's PSUseApprovedVerbs
# rule during `pnpm lint` in .github/workflows/ci.yml.

jobs:
  check-invoke-claude-migration:
    name: Invoke-Claude Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no direct Invoke-Claude in stages
        run: pwsh tools/check-invoke-claude-migration.ps1

  check-tla-version:
    name: TLA+ Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify TLA+ version file matches spec
        run: pwsh tools/check-tla-version.ps1

  check-bdd-action-tags:
    name: BDD Action Tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify @tla-action tags on all BDD scenarios
        run: pwsh tools/check-bdd-action-tags.ps1

  check-bdd-postconditions:
    name: BDD Postconditions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Then clauses in all BDD scenarios
        run: pwsh tools/check-bdd-postconditions.ps1

  check-tla-symbol-parity:
    name: TLA+ Symbol Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare TLA+ action names with PS function names
        run: pwsh tools/check-tla-symbol-parity.ps1

  cascade-order-check:
    name: Cascade Order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cascade-order.md has all 6 stage sections
        run: pwsh tools/cascade-order-check.ps1

  no-string-literal-assertions:
    name: No String Literal Assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no string literals in Should -Be assertions
        run: pwsh tools/no-string-literal-assertions.ps1

# ─── Group 2: TLA+ model checking (1 job) ────────────────────────────────────

  tlc-model-check:
    name: TLC Model Check
    runs-on: ubuntu-latest
    needs: check-tla-version
    steps:
      - uses: actions/checkout@v4
      - name: Run TLC model checker
        run: pwsh tools/run-tlc.ps1 -SpecDir bus/tla -Timeout 300

# ─── Group 3: Gates (4 jobs) ─────────────────────────────────────────────────

  red-green-order:
    name: Red-Green Commit Order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Check TDD commit ordering
        run: pwsh tools/check-red-commit-order.ps1

  gate-executability:
    name: Gate Executability
    runs-on: ubuntu-latest
    needs:
      - check-invoke-claude-migration
      - check-tla-version
      - cascade-order-check
      - no-string-literal-assertions
    steps:
      - uses: actions/checkout@v4
      - name: Verify all gate scripts exit 0
        run: pwsh tools/check-gate-executability.ps1

  performance-baselines:
    name: Performance Baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check performance baselines
        run: pwsh tools/check-perf-baselines.ps1

  schema-hash:
    name: Schema Hash
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify schema hash
        run: |
          $hashFile = 'bus/schema/schema.hash'
          if (-not (Test-Path $hashFile)) {
            Write-Output "FAIL: schema.hash not found"
            exit 1
          }
          $recorded = (Get-Content $hashFile -Raw).Trim()
          Write-Output "PASS: Schema hash present: $recorded"

# ─── Group 4: Operational (2 jobs) ───────────────────────────────────────────

  rollback-rehearsal:
    name: Rollback Rehearsal
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: gate-executability
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run rollback rehearsal tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/bus/integration/rollback-rehearsal.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  emit-gate-proof:
    name: Emit Gate Proof
    runs-on: ubuntu-latest
    if: always()
    needs:
      - gate-executability
      - tlc-model-check
      - performance-baselines
      - schema-hash
    steps:
      - uses: actions/checkout@v4
      - name: Emit gate proof record
        run: |
          $status = if ('${{ needs.gate-executability.result }}' -eq 'success' -and
                        '${{ needs.tlc-model-check.result }}' -eq 'success' -and
                        '${{ needs.performance-baselines.result }}' -eq 'success' -and
                        '${{ needs.schema-hash.result }}' -eq 'success') {
            'pass'
          } else { 'fail' }
          pwsh tools/emit-gate-proof.ps1 -GateName 'ci-suite' -Status $status -ToolVersion '1.0.0'
