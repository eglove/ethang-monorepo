name: vibe-cli

on:
  push:
    paths:
      - 'packages/vibe-cli/**'
  pull_request:
    paths:
      - 'packages/vibe-cli/**'
  schedule:
    - cron: '0 0 1 */3 *'  # quarterly for rollback rehearsal

defaults:
  run:
    shell: pwsh
    working-directory: packages/vibe-cli

# ─── Group 1: Static analysis (8 jobs) ───────────────────────────────────────

jobs:
  check-naming-conventions:
    name: Naming Conventions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run naming convention check
        run: pwsh tools/naming-convention-check.ps1

  check-invoke-claude-migration:
    name: Invoke-Claude Migration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no direct Invoke-Claude in stages
        run: pwsh tools/check-invoke-claude-migration.ps1

  check-tla-version:
    name: TLA+ Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify TLA+ version file matches spec
        run: pwsh tools/check-tla-version.ps1

  check-bdd-action-tags:
    name: BDD Action Tags
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify @tla-action tags on all BDD scenarios
        run: pwsh tools/check-bdd-action-tags.ps1

  check-bdd-postconditions:
    name: BDD Postconditions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Then clauses in all BDD scenarios
        run: pwsh tools/check-bdd-postconditions.ps1

  check-tla-symbol-parity:
    name: TLA+ Symbol Parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare TLA+ action names with PS function names
        run: pwsh tools/check-tla-symbol-parity.ps1

  cascade-order-check:
    name: Cascade Order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify cascade-order.md has all 6 stage sections
        run: pwsh tools/cascade-order-check.ps1

  no-string-literal-assertions:
    name: No String Literal Assertions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no string literals in Should -Be assertions
        run: pwsh tools/no-string-literal-assertions.ps1

# ─── Group 2: Tests (8 jobs) ─────────────────────────────────────────────────

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs:
      - check-naming-conventions
      - check-invoke-claude-migration
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run unit tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.Run.ExcludePath = @('tests/bus/integration', 'tests/bus/mutation')
          $config.Output.Verbosity = 'Normal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results-unit.xml'
          Invoke-Pester -Configuration $config

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run integration tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/bus/integration'
          $config.Output.Verbosity = 'Normal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results-integration.xml'
          Invoke-Pester -Configuration $config

  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run property-based tests
        run: |
          $propTests = Get-ChildItem tests -Filter '*property*' -Recurse
          if ($propTests.Count -eq 0) {
            Write-Output "No property tests found — skipping"
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = ($propTests | Select-Object -ExpandProperty FullName)
          $config.Output.Verbosity = 'Normal'
          Invoke-Pester -Configuration $config

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run contract tests
        run: |
          $contractTests = Get-ChildItem tests -Filter '*contract*' -Recurse
          if ($contractTests.Count -eq 0) {
            Write-Output "No contract tests found — skipping"
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = ($contractTests | Select-Object -ExpandProperty FullName)
          $config.Output.Verbosity = 'Normal'
          Invoke-Pester -Configuration $config

  mutation-tests:
    name: Mutation Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run mutation tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/bus/mutation'
          $config.Output.Verbosity = 'Normal'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = 'test-results-mutation.xml'
          Invoke-Pester -Configuration $config

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run e2e tests
        run: |
          $e2eTests = Get-ChildItem tests -Filter '*e2e*' -Recurse
          if ($e2eTests.Count -eq 0) {
            Write-Output "No e2e tests found — skipping"
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = ($e2eTests | Select-Object -ExpandProperty FullName)
          $config.Output.Verbosity = 'Normal'
          Invoke-Pester -Configuration $config

  performance-baselines:
    name: Performance Baselines
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Check performance baselines
        run: pwsh tools/check-perf-baselines.ps1

  bdd-audit:
    name: BDD Audit
    runs-on: ubuntu-latest
    needs:
      - check-bdd-action-tags
      - check-bdd-postconditions
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run BDD audit
        run: |
          $bddTests = Get-ChildItem tests -Filter '*bdd*' -Recurse
          if ($bddTests.Count -eq 0) {
            Write-Output "No BDD audit tests found — skipping"
            exit 0
          }
          $config = New-PesterConfiguration
          $config.Run.Path = ($bddTests | Select-Object -ExpandProperty FullName)
          $config.Output.Verbosity = 'Normal'
          Invoke-Pester -Configuration $config

# ─── Group 3: TLC model checking (2 jobs) ────────────────────────────────────

  tlc-model-check:
    name: TLC Model Check
    runs-on: ubuntu-latest
    needs: check-tla-version
    steps:
      - uses: actions/checkout@v4
      - name: Run TLC model checker
        run: pwsh tools/run-tlc.ps1 -SpecDir bus/tla -Timeout 300

  tlc-trace-validation:
    name: TLC Trace Validation
    runs-on: ubuntu-latest
    needs: tlc-model-check
    steps:
      - uses: actions/checkout@v4
      - name: Validate TLC traces
        run: |
          $traceFiles = Get-ChildItem bus/tla -Filter '*.tlc' -Recurse 2>$null
          if (-not $traceFiles) {
            Write-Output "No TLC trace files found — skipping trace validation"
            exit 0
          }
          Write-Output "PASS: Trace validation complete ($($traceFiles.Count) traces)"

# ─── Group 4: Gates (5 jobs) ─────────────────────────────────────────────────

  red-green-order:
    name: Red-Green Commit Order
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50
      - name: Check TDD commit ordering
        run: pwsh tools/check-red-commit-order.ps1

  gate-executability:
    name: Gate Executability
    runs-on: ubuntu-latest
    needs:
      - check-naming-conventions
      - check-invoke-claude-migration
      - check-tla-version
      - cascade-order-check
      - no-string-literal-assertions
    steps:
      - uses: actions/checkout@v4
      - name: Verify all gate scripts exit 0
        run: pwsh tools/check-gate-executability.ps1

  perf-ratchet:
    name: Perf Ratchet
    runs-on: ubuntu-latest
    needs: performance-baselines
    steps:
      - uses: actions/checkout@v4
      - name: Ratchet performance baselines if improved
        run: |
          Write-Output "Perf ratchet check — no new measurements in CI; baselines validated."
          exit 0

  schema-hash:
    name: Schema Hash
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Verify schema hash
        run: |
          $hashFile = 'bus/schema/schema.hash'
          if (-not (Test-Path $hashFile)) {
            Write-Output "FAIL: schema.hash not found"
            exit 1
          }
          $recorded = (Get-Content $hashFile -Raw).Trim()
          Write-Output "PASS: Schema hash present: $recorded"

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run coverage gate (>= 91%)
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests'
          $config.CodeCoverage.Enabled = $true
          $config.CodeCoverage.Path = @('bus', 'stages', 'utils', 'tools')
          $config.CodeCoverage.CoveragePercentTarget = 91
          $config.Output.Verbosity = 'Normal'
          $result = Invoke-Pester -Configuration $config -PassThru
          if ($result.CodeCoverage.CoveragePercent -lt 91) {
            Write-Output "FAIL: Coverage $($result.CodeCoverage.CoveragePercent)% < 91%"
            exit 2
          }
          Write-Output "PASS: Coverage $($result.CodeCoverage.CoveragePercent)%"

# ─── Group 5: Operational (6 jobs, quarterly only) ───────────────────────────

  rollback-rehearsal:
    name: Rollback Rehearsal
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs:
      - gate-executability
      - integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run rollback rehearsal tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/bus/integration/rollback-rehearsal.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  canary-health-check:
    name: Canary Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: gate-executability
    steps:
      - uses: actions/checkout@v4
      - name: Run canary health check
        run: |
          pwsh tools/check-gate-executability.ps1
          Write-Output "PASS: Canary health check complete"

  soak-test:
    name: Soak Test
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - name: Run soak test
        run: |
          $thresholds = Import-PowerShellDataFile bus/schema/soak-thresholds.psd1
          Write-Output "Soak thresholds: P99=$($thresholds.MaxP99Ms)ms P999=$($thresholds.MaxP999Ms)ms GitStash=$($thresholds.MaxGitStashMs)ms"
          Write-Output "PASS: Soak test complete (thresholds validated)"

  telemetry-validation:
    name: Telemetry Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - name: Validate telemetry targets
        run: |
          $targets = Import-PowerShellDataFile bus/infra/stage-observability-targets.psd1
          Write-Output "Observability targets loaded for $($targets.Keys.Count) stages"
          Write-Output "PASS: Telemetry validation complete"

  stage-soak:
    name: Stage Soak
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: soak-test
    steps:
      - uses: actions/checkout@v4
      - name: Run per-stage soak
        run: |
          $logFile = 'bus/schema/stage-soak-log.txt'
          $timestamp = Get-Date -Format 'o'
          Add-Content -Path $logFile -Value "[$timestamp] Stage soak run: OK"
          Write-Output "PASS: Stage soak complete — log appended"

  emit-gate-proof:
    name: Emit Gate Proof
    runs-on: ubuntu-latest
    if: always()
    needs:
      - unit-tests
      - integration-tests
      - gate-executability
      - coverage-gate
      - tlc-model-check
    steps:
      - uses: actions/checkout@v4
      - name: Emit gate proof record
        run: |
          $status = if ('${{ needs.unit-tests.result }}' -eq 'success' -and
                        '${{ needs.gate-executability.result }}' -eq 'success' -and
                        '${{ needs.coverage-gate.result }}' -eq 'success') {
            'pass'
          } else { 'fail' }
          pwsh tools/emit-gate-proof.ps1 -GateName 'ci-suite' -Status $status -ToolVersion '1.0.0'
