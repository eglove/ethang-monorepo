name: vibe-cli

on:
  push:
    paths:
      - 'packages/vibe-cli/**'
  pull_request:
    paths:
      - 'packages/vibe-cli/**'
  schedule:
    - cron: '0 0 1 */3 *'  # quarterly for rollback rehearsal

defaults:
  run:
    shell: pwsh
    working-directory: packages/vibe-cli

# Most vibe-cli gates now run as Pester tests via `pnpm test` in
# .github/workflows/ci.yml — see tests/bus/unit/ci-gate-scripts.Tests.ps1.
# This workflow only owns work that `pnpm test` can't do cleanly:
#   - TLA+ TLC model checking (needs parallelism + a JVM + the jar download)
#   - A quarterly rollback-rehearsal cron
#   - Post-run gate-proof emission

jobs:
  tlc-model-check:
    name: TLC (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: BidirectionalComms,    dir: bidirectional-comms,  spec: BidirectionalComms,  cfg: BidirectionalComms.cfg }
          - { label: CleanupImprovements,   dir: cleanup-improvements, spec: CleanupImprovements, cfg: CleanupImprovements.cfg }
          - { label: CodeSimplify,          dir: code-simplify,        spec: CodeSimplify,        cfg: CodeSimplify.cfg }
          - { label: CodingStage,           dir: coding-stage,         spec: CodingStage,         cfg: CodingStage.cfg }
          - { label: ParallelDebates,       dir: parallel-debates,     spec: ParallelDebates,     cfg: ParallelDebates.cfg }
          - { label: PipelineReviewers,     dir: reviewers,            spec: PipelineReviewers,   cfg: PipelineReviewers.cfg }
          - { label: SqliteState,           dir: sqlite-state,         spec: SqliteState,         cfg: SqliteState.cfg }
          - { label: TokenSaving,           dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving.cfg }
          - { label: TokenSaving-MultiAgent, dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving-MultiAgent.cfg }
    env:
      TLC_JAR: /home/runner/.cache/tlaplus/tla2tools.jar
    steps:
      - uses: actions/checkout@v4
      - name: Cache TLC jar
        id: cache-tlc
        uses: actions/cache@v4
        with:
          path: ~/.cache/tlaplus
          key: tla2tools-v1.8.0
      - name: Download TLC jar
        if: steps.cache-tlc.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/.cache/tlaplus
          curl -fL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar \
            -o ~/.cache/tlaplus/tla2tools.jar
      - name: Run TLC on ${{ matrix.label }}
        run: |
          pwsh tools/run-tlc.ps1 `
            -Spec   "docs/${{ matrix.dir }}/tla/${{ matrix.spec }}.tla" `
            -Config "docs/${{ matrix.dir }}/tla/${{ matrix.cfg }}" `
            -Timeout 600

  rollback-rehearsal:
    name: Rollback Rehearsal (quarterly)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        run: Install-Module -Name Pester -Force -Scope CurrentUser
      - name: Run rollback rehearsal tests
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/bus/integration/rollback-rehearsal.Tests.ps1'
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

  emit-gate-proof:
    name: Emit Gate Proof
    runs-on: ubuntu-latest
    if: always()
    needs: tlc-model-check
    steps:
      - uses: actions/checkout@v4
      - name: Emit gate proof record
        run: |
          $status = if ('${{ needs.tlc-model-check.result }}' -eq 'success') { 'pass' } else { 'fail' }
          pwsh tools/emit-gate-proof.ps1 -GateName 'tlc-suite' -Status $status -ToolVersion '1.0.0'
