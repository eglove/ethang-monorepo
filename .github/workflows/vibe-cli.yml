name: vibe-cli

on:
  push:
    paths:
      - 'packages/vibe-cli/**'
  pull_request:
    paths:
      - 'packages/vibe-cli/**'

defaults:
  run:
    shell: pwsh
    working-directory: packages/vibe-cli

# Pester tests, code coverage, lint, and gate-script integration checks all
# run via `pnpm test` + `pnpm lint` in .github/workflows/ci.yml — including
# tests/bus/integration/rollback-rehearsal.Tests.ps1.
#
# This workflow exists solely for TLA+ TLC model checking, which needs a JVM,
# the tla2tools.jar download, and per-spec parallelism that doesn't fit
# cleanly inside `pnpm test`.

jobs:
  tlc-model-check:
    name: TLC (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: BidirectionalComms,    dir: bidirectional-comms,  spec: BidirectionalComms,  cfg: BidirectionalComms.cfg }
          - { label: CleanupImprovements,   dir: cleanup-improvements, spec: CleanupImprovements, cfg: CleanupImprovements.cfg }
          - { label: CodeSimplify,          dir: code-simplify,        spec: CodeSimplify,        cfg: CodeSimplify.cfg }
          - { label: CodingStage,           dir: coding-stage,         spec: CodingStage,         cfg: CodingStage.cfg }
          - { label: ParallelDebates,       dir: parallel-debates,     spec: ParallelDebates,     cfg: ParallelDebates.cfg }
          - { label: PipelineReviewers,     dir: reviewers,            spec: PipelineReviewers,   cfg: PipelineReviewers.cfg }
          - { label: SqliteState,           dir: sqlite-state,         spec: SqliteState,         cfg: SqliteState.cfg }
          - { label: TokenSaving,           dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving.cfg }
          - { label: TokenSaving-MultiAgent, dir: token-saving,         spec: TokenSaving,         cfg: TokenSaving-MultiAgent.cfg }
    env:
      TLC_JAR: /home/runner/.cache/tlaplus/tla2tools.jar
    steps:
      - uses: actions/checkout@v4
      - name: Cache TLC jar
        id: cache-tlc
        uses: actions/cache@v4
        with:
          path: ~/.cache/tlaplus
          key: tla2tools-v1.8.0
      - name: Download TLC jar
        if: steps.cache-tlc.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ~/.cache/tlaplus
          curl -fL https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar \
            -o ~/.cache/tlaplus/tla2tools.jar
      - name: Run TLC on ${{ matrix.label }}
        run: |
          pwsh tools/run-tlc.ps1 `
            -Spec   "docs/${{ matrix.dir }}/tla/${{ matrix.spec }}.tla" `
            -Config "docs/${{ matrix.dir }}/tla/${{ matrix.cfg }}" `
            -Timeout 600
