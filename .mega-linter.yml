---
# MegaLinter Configuration
# Documentation: https://megalinter.io/latest/configuration/

# Disable linters already covered by the local pnpm lint (ESLint + TSC)
DISABLE_LINTERS:
  - JAVASCRIPT_ES
  - JAVASCRIPT_STANDARD
  - JAVASCRIPT_PRETTIER
  - JSX_ESLINT
  - TSX_ESLINT
  - TYPESCRIPT_ES
  - TYPESCRIPT_STANDARD
  - TYPESCRIPT_PRETTIER

# Disable noisy or redundant linters
DISABLE:
  - SPELL # Disables all spell checkers (CSPELL, etc.)

# Configuration
SHOW_ELAPSED_TIME: true
VALIDATE_ALL_CODEBASE: true # Validate all sources

# Ignore autogenerated or large files
EXCLUDED_DIRECTORIES:
  - node_modules
  - .wrangler
  - dist

# Specifically ignore pnpm-lock.yaml and .d.ts files for all linters
FILTER_REGEX_EXCLUDE: (pnpm-lock\.yaml|.*\.d\.ts)
