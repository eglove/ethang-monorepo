sonar.issue.ignore.multicriteria=1
sonar.issue.ignore.multicriteria.1.ruleKey=typescript:S4782
sonar.issue.ignore.multicriteria.1.resourceKey=**/*

# Exclude paths ignored by ESLint globalIgnores and .gitignore
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/*.d.ts,\
  **/.wrangler/**,\
  **/.sanity/**,\
  **/coverage/**,\
  **/storybook-static/**,\
  **/convex/_generated/**,\
  **/playwright-report/**,\
  **/test-results/**,\
  **/migrations/**,\
  **/docs/**,\
  **/public/index.css,\
  **/public/sw.js,\
  apps/**/*.gen.ts,\
  **/wrangler.jsonc,\
  packages/eslint-config/eslint.config.js,\
  sonar.ts